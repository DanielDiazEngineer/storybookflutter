name: storybookapp
description: Children's storybook app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4
  path: ^1.9.0
  crypto: ^3.0.5
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.2     # NEW — resume state persistence
  animations: ^2.0.11             # NEW — OpenContainer for chapter sheet morph

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/catalog.json
    - assets/stories/bunny_adventure/story.json
    - assets/stories/bunny_adventure/cover.jpg
    - assets/stories/bunny_adventure/pages/
    - assets/stories/bunny_adventure/en/audio/
    - assets/stories/bunny_adventure/es/audio/
